<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="icon/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>BukuLedger – Register</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">

  <!-- link supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background-color: var(--bg-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--space-4);">
  <div class="form-card" style="max-width: 400px; width: 100%; margin: 0;">
    <div style="text-align: center; margin-bottom: var(--space-6);">
      <i class="fas fa-user-plus" style="font-size: 3rem; color: var(--accent-blue);"></i>
      <h1 class="header-title" style="justify-content: center; margin-top: var(--space-2);">Daftar Akun</h1>
      <p style="color: var(--text-tertiary); margin-top: var(--space-2);">Buat akun baru</p>
    </div>

    <form id="registerForm" class="modal-form">
      <div class="form-group">
        <label class="form-label">Nama Lengkap</label>
        <input type="text" id="fullname" class="form-input" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="nama@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Minimal 6 karakter" required>
      </div>
      <div class="form-group">
        <label class="form-label">Konfirmasi Password</label>
        <input type="password" id="confirmPassword" class="form-input" placeholder="Ulangi password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">
        <i class="fas fa-user-check"></i> Daftar
      </button>
    </form>

    <div style="text-align: center; margin-top: var(--space-4);">
      <span style="color: var(--text-tertiary);">Sudah punya akun? </span>
      <a href="login.html" style="color: var(--accent-blue); text-decoration: none; font-weight: 500;">Masuk</a>
    </div>
    <div style="text-align: center; margin-top: var(--space-2);">
      <a href="index.html" style="color: var(--text-tertiary); text-decoration: none; font-size: var(--text-sm);">
        <i class="fas fa-arrow-left"></i> Kembali ke Aplikasi
      </a>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js';
    import { showNotification } from './js/utils.js';

    const form = document.getElementById('registerForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const fullname = document.getElementById('fullname').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (!fullname || !email || !password || !confirm) {
        showNotification('Semua field harus diisi!', 'error');
        return;
      }
      if (password !== confirm) {
        showNotification('Password dan konfirmasi tidak cocok', 'error');
        return;
      }
      if (password.length < 6) {
        showNotification('Password minimal 6 karakter', 'error');
        return;
      }

      try {
        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: { data: { full_name: fullname } }
        });

        if (error) {
          showNotification('Registrasi gagal: ' + error.message, 'error');
          console.error(error);
        } else {
          showNotification('Registrasi berhasil! Mengalihkan ke halaman login...', 'success');
          window.location.href = 'login.html';
        }
      } catch (err) {
        showNotification('Terjadi kesalahan: ' + err.message, 'error');
        console.error(err);
      }
    });
  </script>
</body>
</html>
